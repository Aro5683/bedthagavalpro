<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B.Ed தகவல்கள்</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ---------- MARKDOWN STYLING FIX ---------- */

h1 {
    font-size: 28px;
    font-weight: 700;
    color: #0284c7;
    margin-bottom: 15px;
}

h2 {
    font-size: 22px;
    font-weight: 600;
    color: #0369a1;
    margin-top: 20px;
    margin-bottom: 10px;
}

h3 {
    font-size: 18px;
    font-weight: 600;
    color: #0284c7;
    margin-top: 15px;
    margin-bottom: 8px;
}

p {
    margin-bottom: 10px;
}

/* Better spacing */
.content {
    line-height: 1.8;
}

/* Bold highlight */
strong {
    color: #0f172a;
}
/* ---------- BASE ---------- */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e0f2fe, #f8fafc);
    color: #0f172a;
}

/* ---------- NEW PREMIUM HEADER ---------- */
.header-box {
    text-align: center;
    padding: 30px 15px;
    background: linear-gradient(to right, #e0f2fe, #f0f9ff);
}

.header-title {
    font-size: 34px;
    font-weight: 700;
    color: #0284c7;
}

.header-sub {
    margin-top: 8px;
    font-size: 14px;
    color: #475569;
}

/* ---------- GRID ---------- */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* ---------- CARD ---------- */
.card {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    transition: 0.3s;
}
.card:hover {
    transform: translateY(-5px);
}

/* ---------- BUTTON ---------- */
.btn {
    margin-top: 8px;
    padding: 6px 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: white;
    cursor: pointer;
}

/* ---------- BACK ---------- */
.back {
    padding: 15px;
    color: #0284c7;
    cursor: pointer;
    font-weight: 500;
}

/* ---------- CONTENT ---------- */
.content {
    margin: 20px;
    padding: 25px;
    border-radius: 18px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    line-height: 1.8;
}

/* ---------- TEXT ---------- */
h3 { color: #0284c7; }

blockquote {
    border-left: 4px solid #38bdf8;
    padding-left: 12px;
    color: #475569;
}

/* ---------- POPUP ---------- */
.popup {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #0ea5e9;
    color: white;
    padding: 10px 20px;
    border-radius: 12px;
    opacity: 0;
    transition: 0.3s;
}
.popup.show { opacity: 1; }

</style>
</head>

<body>

<!-- HEADER -->
<div class="header-box">
    <div class="header-title">B.Ed Thagavalgal</div>
    <div class="header-sub">Fast • Clear • Exam Ready</div>
</div>

<div id="app"></div>

<div id="popup" class="popup">Link Copied 🔗</div>

<script>

let app = document.getElementById("app");
let popup = document.getElementById("popup");

let state = {};
let isSharedView = false;

/* ---------- LANGUAGE ---------- */

function showLanguage() {
    app.innerHTML = `
    <div class="grid">
        <div class="card" onclick="selectLang('english')">English Medium</div>
        <div class="card" onclick="selectLang('tamil')">தமிழ் Medium</div>
    </div>`;
}

function selectLang(lang) {
    state.lang = lang;
    showSubjects();
}

/* ---------- SUBJECTS ---------- */

function showSubjects() {
    app.innerHTML = `
    <div class="back" onclick="showLanguage()">⬅ Back</div>
    <div class="grid">
        <div class="card" onclick="showUnits('pedagogy')">Pedagogy</div>
        <div class="card" onclick="showUnits('psychology')">Psychology</div>
        <div class="card" onclick="showUnits('english')">English</div>
        <div class="card" onclick="showUnits('tamil')">Tamil</div>
        <div class="card" onclick="showUnits('assessment')">Assessment</div>
        <div class="card" onclick="showUnits('child')">Child</div>
    </div>`;
}

/* ---------- UNITS ---------- */

function showUnits(subject) {
    state.subject = subject;

    app.innerHTML = `
    <div class="back" onclick="showSubjects()">⬅ Back</div>
    <div class="grid">
        <div class="card" onclick="showQuestions('unit1')">Unit 1</div>
        <div class="card" onclick="showQuestions('unit2')">Unit 2</div>
    </div>`;
}

/* ---------- QUESTIONS ---------- */

function showQuestions(unit) {
    state.unit = unit;

    app.innerHTML = `
    <div class="back" onclick="showUnits(state.subject)">⬅ Back</div>
    <div class="grid">
        ${createCard('q1')}
        ${createCard('q2')}
    </div>`;
}

/* ---------- CARD ---------- */

function createCard(q) {
    let link = getLink(q);

    return `
    <div class="card">
        <b>10 Mark ${q.toUpperCase()}</b>
        <p style="font-size:13px;color:#64748b;">Easy explanation + example</p>
        <button class="btn" onclick="openAnswer('${q}')">Read More</button>
        <button class="btn" onclick="copyLink('${link}')">Copy Link</button>
    </div>`;
}

/* ---------- FORMAT ---------- */

function formatText(text) {
    return marked.parse(text);
}

/* ---------- LOAD ANSWER ---------- */

function openAnswer(q) {
    isSharedView = false;
    loadAnswer(q);
}

function loadAnswer(q) {

    let path = `content/${state.lang}/sem1-${state.subject}-${state.unit}-${q}.txt`;

    fetch(path)
    .then(res => {
        if (!res.ok) throw new Error();
        return res.text();
    })
    .then(data => {

        let link = getLink(q);

        let backBtn = isSharedView ? "" :
        `<div class="back" onclick="showQuestions(state.unit)">⬅ Back</div>`;

        app.innerHTML = `
        ${backBtn}
        <div class="content">
          ${formatText(data)}
            <button class="btn" onclick="copyLink('${link}')">Copy Link 🔗</button>
        </div>`;
    })
    .catch(() => {

        let backBtn = isSharedView ? "" :
        `<div class="back" onclick="showQuestions(state.unit)">⬅ Back</div>`;

        app.innerHTML = `
        ${backBtn}
        <div class="content">
            ❌ Answer not available
        </div>`;
    });
}

/* ---------- LINK ---------- */

function getLink(q) {
    return `${location.origin}${location.pathname}?lang=${state.lang}&sub=${state.subject}&unit=${state.unit}&q=${q}`;
}

/* ---------- COPY ---------- */

function copyLink(link) {
    navigator.clipboard.writeText(link);
    popup.classList.add("show");
    setTimeout(() => popup.classList.remove("show"), 2000);
}

/* ---------- LOAD FROM URL ---------- */

function loadFromURL() {
    let params = new URLSearchParams(window.location.search);

    if (params.get("q")) {
        isSharedView = true;

        state.lang = params.get("lang");
        state.subject = params.get("sub");
        state.unit = params.get("unit");

        loadAnswer(params.get("q"));
    } else {
        showLanguage();
    }
}

loadFromURL();

</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
