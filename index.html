<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B.Ed Smart Notes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #0f172a;
    color: white;
}

header {
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    background: #1e293b;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    transition: 0.3s;
}
.card:hover {
    background: #334155;
    transform: scale(1.05);
}

.back {
    padding: 15px;
    cursor: pointer;
    color: #38bdf8;
}

.content {
    background: #14532d;
    padding: 15px;
    margin: 15px;
    border-radius: 10px;
    line-height: 1.7;
}

h2 {
    color: #bbf7d0;
}

blockquote {
    border-left: 4px solid #86efac;
    padding-left: 12px;
    margin: 10px 0;
    color: #d1fae5;
}
</style>
</head>

<body>

<header>B.Ed Smart Notes</header>

<div id="app"></div>

<script>

let app = document.getElementById("app");

let state = {};

/* ---------- NAVIGATION ---------- */

function showSubjects() {
    app.innerHTML = `
    <div class="grid">
        <div class="card" onclick="showUnits('pedagogy')">Pedagogy</div>
        <div class="card" onclick="showUnits('psychology')">Psychology</div>
    </div>
    `;
}

function showUnits(subject) {
    state.subject = subject;

    app.innerHTML = `
    <div class="back" onclick="showSubjects()">⬅ Back</div>
    <div class="grid">
        <div class="card" onclick="showQuestions('unit1')">Unit 1</div>
        <div class="card" onclick="showQuestions('unit2')">Unit 2</div>
    </div>
    `;
}

function showQuestions(unit) {
    state.unit = unit;

    app.innerHTML = `
    <div class="back" onclick="showUnits(state.subject)">⬅ Back</div>
    <div class="grid">
        <div class="card" onclick="loadAnswer('q1')">10 Mark Question 1</div>
        <div class="card" onclick="loadAnswer('q2')">10 Mark Question 2</div>
    </div>
    `;
}

/* ---------- FORMATTER ---------- */

function formatText(text) {

    // Escape HTML
    text = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");

    // Bold
    text = text.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");

    // Italic
    text = text.replace(/\*(.*?)\*/g, "<i>$1</i>");

    // Heading (*line*)
    text = text.replace(/^<i>(.*?)<\/i>$/gm, "<h2>$1</h2>");

    // Blockquote
    text = text.replace(/^&gt; ?(.*)$/gm, "<blockquote>$1</blockquote>");

    // Line breaks
    text = text.replace(/\n/g, "<br>");

    return text;
}

/* ---------- LOAD ANSWER ---------- */

function loadAnswer(q) {

    let path = `content/sem1-${state.subject}-${state.unit}-${q}.txt`;

    fetch(path)
    .then(res => res.text())
    .then(data => {

        let formatted = formatText(data);

        app.innerHTML = `
        <div class="back" onclick="showQuestions(state.unit)">⬅ Back</div>
        <div class="content">${formatted}</div>
        `;
    })
    .catch(() => {
        app.innerHTML = "<p style='padding:20px;'>Content not found ❌</p>";
    });
}

/* INIT */
showSubjects();

</script>

</body>
</html>
