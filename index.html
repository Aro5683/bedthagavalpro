<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>B.Ed Smart Notes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ---------- BASE ---------- */
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: linear-gradient(to bottom, #f8fafc, #e0f2fe);
    color: #0f172a;
}

/* ---------- HEADER ---------- */
header {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #e2e8f0;
}

/* ---------- FOOTER ---------- */
footer {
    text-align: center;
    padding: 15px;
    font-size: 14px;
    color: #64748b;
}

/* ---------- GRID ---------- */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* ---------- CARD ---------- */
.card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    padding: 18px;
    border-radius: 18px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    transition: 0.3s;
}
.card:hover {
    transform: translateY(-6px);
}

/* ---------- BUTTON ---------- */
.btn {
    margin-top: 8px;
    padding: 6px 12px;
    border: none;
    background: linear-gradient(to right, #38bdf8, #0ea5e9);
    color: white;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
}

/* ---------- BACK ---------- */
.back {
    padding: 15px;
    cursor: pointer;
    color: #0284c7;
    font-weight: 500;
}

/* ---------- CONTENT ---------- */
.content {
    background: white;
    margin: 20px;
    padding: 20px;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    line-height: 1.8;
}

/* ---------- TEXT STYLE ---------- */
h3 {
    color: #0284c7;
    margin-top: 10px;
}

blockquote {
    border-left: 4px solid #38bdf8;
    padding-left: 12px;
    margin: 10px 0;
    color: #475569;
}

/* ---------- POPUP ---------- */
.popup {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #0ea5e9;
    color: white;
    padding: 10px 20px;
    border-radius: 12px;
    opacity: 0;
    transition: 0.3s;
}
.popup.show {
    opacity: 1;
}

</style>
</head>

<body>

<header>B.Ed Smart Notes</header>

<div id="app"></div>

<footer>Simple Notes • Easy Learning • B.Ed</footer>

<div id="popup" class="popup">Link Copied 🔗</div>

<script>

let app = document.getElementById("app");
let popup = document.getElementById("popup");

let state = {};
let isSharedView = false;

/* ---------- LANGUAGE ---------- */

function showLanguage() {
    app.innerHTML = `
    <div class="grid">
        <div class="card" onclick="selectLang('english')">English Medium</div>
        <div class="card" onclick="selectLang('tamil')">தமிழ் Medium</div>
    </div>`;
}

function selectLang(lang) {
    state.lang = lang;
    showSubjects();
}

/* ---------- SUBJECTS ---------- */

function showSubjects() {
    app.innerHTML = `
    <div class="back" onclick="showLanguage()">⬅ Back</div>
    <div class="grid">
        <div class="card" onclick="showUnits('pedagogy')">Pedagogy</div>
        <div class="card" onclick="showUnits('psychology')">Educational Psychology</div>
        <div class="card" onclick="showUnits('english')">English Teaching</div>
        <div class="card" onclick="showUnits('tamil')">Tamil Teaching</div>
        <div class="card" onclick="showUnits('assessment')">Assessment</div>
    </div>`;
}

/* ---------- UNITS ---------- */

function showUnits(subject) {
    state.subject = subject;

    app.innerHTML = `
    <div class="back" onclick="showSubjects()">⬅ Back</div>
    <div class="grid">
        <div class="card" onclick="showQuestions('unit1')">Unit 1</div>
        <div class="card" onclick="showQuestions('unit2')">Unit 2</div>
    </div>`;
}

/* ---------- QUESTIONS ---------- */

function showQuestions(unit) {
    state.unit = unit;

    app.innerHTML = `
    <div class="back" onclick="showUnits(state.subject)">⬅ Back</div>
    <div class="grid">
        ${createCard('q1')}
        ${createCard('q2')}
    </div>`;
}

/* ---------- CARD ---------- */

function createCard(q) {
    let link = getLink(q);

    return `
    <div class="card">
        <b>10 Mark ${q.toUpperCase()}</b>
        <p style="font-size:13px;color:#64748b;">Easy explanation + example</p>
        <button class="btn" onclick="loadAnswer('${q}')">Read More</button>
        <button class="btn" onclick="copyLink('${link}')">Copy Link</button>
    </div>`;
}

/* ---------- FORMAT ---------- */

function formatText(text) {
    text = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
    text = text.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
    text = text.replace(/\*(.*?)\*/g, "<h3>$1</h3>");
    text = text.replace(/^&gt; ?(.*)$/gm, "<blockquote>$1</blockquote>");
    text = text.replace(/\n/g, "<br>");
    return text;
}

/* ---------- LOAD ANSWER ---------- */

function loadAnswer(q) {

    let path = `content/${state.lang}/sem1-${state.subject}-${state.unit}-${q}.txt`;

    fetch(path)
    .then(res => {
        if (!res.ok) throw new Error();
        return res.text();
    })
    .then(data => {

        let link = getLink(q);

        let backBtn = isSharedView ? "" :
        `<div class="back" onclick="showQuestions(state.unit)">⬅ Back</div>`;

        app.innerHTML = `
        ${backBtn}
        <div class="content">
            ${formatText(data)}
            <br><br>
            <button class="btn" onclick="copyLink('${link}')">Copy Link 🔗</button>
        </div>`;
    })
    .catch(() => {
        app.innerHTML = `<div class="content">❌ Answer not available</div>`;
    });
}

/* ---------- LINK ---------- */

function getLink(q) {
    return `${location.origin}${location.pathname}?lang=${state.lang}&sub=${state.subject}&unit=${state.unit}&q=${q}`;
}

/* ---------- COPY ---------- */

function copyLink(link) {
    navigator.clipboard.writeText(link);
    popup.classList.add("show");
    setTimeout(() => popup.classList.remove("show"), 2000);
}

/* ---------- LOAD FROM URL ---------- */

function loadFromURL() {
    let params = new URLSearchParams(window.location.search);

    if (params.get("q")) {
        isSharedView = true;

        state.lang = params.get("lang");
        state.subject = params.get("sub");
        state.unit = params.get("unit");

        loadAnswer(params.get("q"));
    } else {
        showLanguage();
    }
}

/* INIT */
loadFromURL();

</script>

</body>
</html>
